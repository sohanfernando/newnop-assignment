# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/task_tracker_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:K56ucT7KZGPNei736Q3+w/Vfm5z40gy6Xsump2PV/EM=}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Default admin account (seeded on startup if it doesn't already exist)
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.email=${ADMIN_EMAIL:admin@tasktracker.local}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Server
server.port=${SERVER_PORT:8080}