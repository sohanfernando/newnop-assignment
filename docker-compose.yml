services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-1234}
      MYSQL_DATABASE: task_tracker_db
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-1234}"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/task_tracker_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-1234}
      JWT_SECRET: ${JWT_SECRET:-K56ucT7KZGPNei736Q3+w/Vfm5z40gy6Xsump2PV/EM=}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@tasktracker.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
