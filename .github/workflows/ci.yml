name: CI/CD

on:
  push:
  pull_request:

env:
  ACR_LOGIN_SERVER: tasktrackersohanacr.azurecr.io
  BACKEND_URL: https://tasktracker-backend-sohan.azurewebsites.net
  FRONTEND_URL: https://tasktracker-frontend-sohan.azurewebsites.net

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install dependencies
        run: ./mvnw -B dependency:go-offline

      - name: Lint (Spotless)
        run: ./mvnw -B spotless:check

      - name: Test
        run: ./mvnw -B test

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy-backend:
    name: Deploy backend to Azure
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/tasktracker-backend:${{ github.sha }} \
                        -t ${{ env.ACR_LOGIN_SERVER }}/tasktracker-backend:latest \
                        ./backend
          docker push ${{ env.ACR_LOGIN_SERVER }}/tasktracker-backend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/tasktracker-backend:latest

      - name: Restart Azure Web App
        run: az webapp restart --name tasktracker-backend-sohan --resource-group tasktracker-rg

  deploy-frontend:
    name: Deploy frontend to Azure
    needs: [frontend, deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ env.BACKEND_URL }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/tasktracker-frontend:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/tasktracker-frontend:latest \
            ./frontend
          docker push ${{ env.ACR_LOGIN_SERVER }}/tasktracker-frontend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/tasktracker-frontend:latest

      - name: Restart Azure Web App
        run: az webapp restart --name tasktracker-frontend-sohan --resource-group tasktracker-rg
